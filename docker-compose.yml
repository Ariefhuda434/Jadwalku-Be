services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jadwal-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: jadwal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
